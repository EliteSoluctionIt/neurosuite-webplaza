<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroAlert</title>
<!-- Google Fonts rimossi: funziona offline con system fonts -->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1A3A2A;--mid:#2D6A4F;--light:#95D5B2;--accent:#D4A843;
  --bg:#F4F1EB;--white:#FFFFFF;--gray:#6B7280;--lgray:#E2EDE6;
  --text:#1F2937;--red:#B91C1C;--blue:#065A82;--violet:#5B3A8C;
  --nav-h:56px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--text)}
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(26,58,42,0.97);backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 40px;gap:6px;z-index:100;border-bottom:1px solid rgba(149,213,178,0.12)}
.nav-logo{font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-weight:700;color:var(--white);letter-spacing:0.04em;margin-right:22px;white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--accent)}
.nav-pills{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none;flex:1;min-width:0}
.nav-pill{padding:5px 12px;border-radius:3px;font-size:10px;font-weight:500;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;white-space:nowrap;border:1px solid transparent;text-transform:uppercase;letter-spacing:0.03em}
.nav-pill:hover{color:var(--light);border-color:rgba(149,213,178,0.2)}
.nav-pill.active{background:var(--mid);color:var(--white);border-color:rgba(149,213,178,0.3)}
.nav-arrows{margin-left:8px;display:flex;gap:8px;align-items:center;flex-shrink:0}
.nav-arrow{width:32px;height:32px;border:1px solid rgba(149,213,178,0.25);border-radius:3px;background:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.18s}
.nav-arrow:hover{background:var(--mid);color:var(--white)}
.nav-arrow:disabled{opacity:0.2;cursor:default}
.nav-pills::-webkit-scrollbar{display:none}
.nav-counter{font-family:'Courier New',Courier,monospace;font-size:11px;color:rgba(255,255,255,0.35);padding:0 8px}
#stage{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;padding:46px 62px 34px;opacity:0;pointer-events:none;transition:opacity 0.35s ease,transform 0.35s ease;transform:translateX(40px);will-change:opacity,transform}
.slide.active{opacity:1!important;pointer-events:all;transform:translateX(0)}
.slide.prev{opacity:0;transform:translateX(-40px)}
.slide-dark{background:var(--dark)}
.slide-dark::after{content:'';position:absolute;right:0;top:0;bottom:0;width:150px;background:linear-gradient(to right,transparent,rgba(45,106,79,0.28) 40%,rgba(149,213,178,0.13));pointer-events:none}
.slide-light{background:var(--bg)}
h1{font-family:Georgia,'Times New Roman',serif;font-size:clamp(34px,4.8vw,60px);font-weight:700;line-height:1.05}
h2{font-family:Georgia,'Times New Roman',serif;font-size:clamp(22px,2.8vw,38px);font-weight:600;line-height:1.1}
h3{font-family:Georgia,'Times New Roman',serif;font-size:clamp(14px,1.6vw,20px);font-weight:600;line-height:1.2}
.accent-line{width:52px;height:3px;background:var(--accent);margin:11px 0 20px;border-radius:2px}
#progress{position:fixed;bottom:0;left:0;right:0;height:2px;background:rgba(149,213,178,0.12);z-index:100}
#progress-bar{height:100%;background:var(--accent);transition:width 0.35s ease}

.slide.active>*{opacity:1}

/* S1 */
#s1{flex-direction:column;justify-content:center}
#s1 .sub{font-family:Georgia,'Times New Roman',serif;font-size:clamp(14px,1.7vw,21px);font-style:italic;color:var(--light);margin-top:16px;margin-bottom:26px;max-width:560px;line-height:1.45}
#s1 .desc{font-size:clamp(12px,1.05vw,14px);color:rgba(194,213,200,0.82);max-width:520px;line-height:1.78}
#s1 .year{position:absolute;bottom:30px;left:62px;font-family:'Courier New',Courier,monospace;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:0.1em}

/* S2 */
#s2{flex-direction:column}
#s2 .cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;flex:1;margin-top:16px;min-height:0}
#s2 .stat-card{background:var(--white);border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);padding:24px 20px 18px;display:flex;flex-direction:column;position:relative;overflow:hidden}
#s2 .stat-card::before{content:'';display:block;height:4px;position:absolute;top:0;left:0;right:0}
#s2 .stat-card:nth-child(1)::before,#s2 .stat-card:nth-child(2)::before{background:var(--mid)}
#s2 .stat-card:nth-child(3)::before{background:var(--accent)}
#s2 .stat-val{font-family:Georgia,'Times New Roman',serif;font-size:clamp(28px,3.8vw,48px);font-weight:700;color:var(--dark);line-height:1;margin-top:6px}
#s2 .stat-lbl{font-size:11px;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:0.07em;margin-top:8px;margin-bottom:10px}
#s2 .stat-body{font-size:12px;color:var(--gray);line-height:1.65;flex:1}
#s2 .footer-note{background:#EAF4EE;border-left:3px solid var(--mid);padding:11px 16px;border-radius:2px;font-size:12px;color:var(--text);margin-top:14px;flex:0 0 auto}

/* S3 */
#s3{flex-direction:column}
#s3 .timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;flex:1;margin-top:20px;min-height:0}
#s3 .tl-card{border-radius:4px;overflow:hidden;display:flex;flex-direction:column;background:rgba(255,255,255,0.06)}
#s3 .tl-top{height:4px;flex:0 0 auto}
#s3 .tl-day{font-family:'Courier New',Courier,monospace;font-size:10px;font-weight:500;letter-spacing:0.07em;padding:13px 16px 5px;text-transform:uppercase}
#s3 .tl-label{font-family:Georgia,'Times New Roman',serif;font-size:clamp(14px,1.7vw,20px);font-weight:700;padding:5px 16px 9px;line-height:1.2}
#s3 .tl-detail{font-size:12px;padding:0 16px 16px;line-height:1.7;flex:1;opacity:0.82}
#s3 .tagline{margin-top:16px;font-family:Georgia,'Times New Roman',serif;font-size:clamp(13px,1.3vw,16px);font-style:italic;color:var(--accent);text-align:center;flex:0 0 auto}

/* S4 */
#s4{flex-direction:column}
#s4 .sensors-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;flex:1;margin-top:16px;min-height:0}
#s4 .sensor-card{background:var(--white);border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;display:flex;flex-direction:column;padding:0 0 12px}
#s4 .sensor-bar{height:4px}
#s4 .sensor-label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:12px 14px 4px}
#s4 .sensor-items{padding:7px 14px 9px;flex:1}
#s4 .sensor-items li{font-size:11px;color:var(--text);padding:3px 0;list-style:none;display:flex;gap:6px;align-items:flex-start;line-height:1.5}
#s4 .sensor-items li::before{content:'Ã¢â‚¬â€';color:var(--mid);flex-shrink:0}
#s4 .sensor-proof{font-size:9.5px;color:var(--gray);font-style:italic;padding:9px 14px 0;line-height:1.5;border-top:1px solid var(--lgray);margin:0 14px}

/* S5 */
#s5{flex-direction:column}
#s5 .pipeline{display:flex;gap:3px;margin-top:20px;margin-bottom:14px;flex:0 0 auto}
#s5 .pipe-step{flex:1;padding:10px 4px;text-align:center;font-size:9.5px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--white);border-radius:2px;line-height:1.3}
#s5 .cols{display:grid;grid-template-columns:1fr 1fr;gap:15px;flex:1;min-height:0}
#s5 .col-card{background:var(--white);border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;padding:18px 20px;display:flex;flex-direction:column}
#s5 .col-card h3{color:var(--dark);margin-bottom:13px}
#s5 .rule{display:flex;gap:9px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--lgray)}
#s5 .rule:last-child{border:none}
#s5 .rule-num{width:20px;height:20px;background:var(--mid);color:var(--white);border-radius:2px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#s5 .rule-txt{font-size:12px;color:var(--text);line-height:1.55}
#s5 .ex-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--lgray)}
#s5 .ex-row:last-child{border:none}
#s5 .ex-param{font-size:11px;font-weight:500;color:var(--mid)}
#s5 .ex-val{font-size:11px;color:var(--text);font-family:'Courier New',Courier,monospace}

/* S6 */
#s6{flex-direction:column}
#s6 .diseases{flex:1;display:flex;flex-direction:column;gap:7px;margin-top:16px;min-height:0}
#s6 .disease-row{display:grid;grid-template-columns:2.1fr 0.9fr 3fr;background:var(--white);border-radius:4px;box-shadow:0 1px 8px rgba(0,0,0,0.05);overflow:hidden;flex:1;align-items:center}
#s6 .disease-row:nth-child(even){background:var(--bg)}
#s6 .d-left{display:flex;align-items:stretch}
#s6 .d-bar{width:4px;flex-shrink:0}
#s6 .d-name{font-size:12px;font-weight:500;color:var(--dark);padding:0 16px}
#s6 .d-badge{font-size:10.5px;font-weight:700;color:var(--white);padding:5px 12px;border-radius:2px;text-align:center;white-space:nowrap;font-family:'Courier New',Courier,monospace}
#s6 .d-signals{font-size:11px;color:var(--gray);padding:0 18px;line-height:1.5}

/* S7 */
#s7{flex-direction:column}
#s7 .papers{display:grid;grid-template-columns:1fr 1fr;gap:13px;flex:1;margin-top:16px;min-height:0}
#s7 .paper{background:var(--white);border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;display:flex}
#s7 .paper-bar{width:4px;flex-shrink:0}
#s7 .paper-body{padding:17px 19px;display:flex;flex-direction:column}
#s7 .paper-ref{font-family:Georgia,'Times New Roman',serif;font-size:14px;font-weight:700;color:var(--dark);margin-bottom:8px}
#s7 .paper-finding{font-size:12px;color:var(--text);line-height:1.65;flex:1}
#s7 .paper-so{font-size:11px;color:var(--mid);font-style:italic;margin-top:9px;padding-top:9px;border-top:1px solid var(--lgray)}

/* S8 */
#s8{flex-direction:column}
#s8 .content{display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1;margin-top:16px;min-height:0}
#s8 .chart-area{background:var(--white);border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);padding:20px;display:flex;flex-direction:column}
#s8 .chart-title{font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--gray);margin-bottom:12px}
#s8 svg{flex:1}
#s8 .stats-col{display:flex;flex-direction:column;gap:11px}
#s8 .mstat{background:var(--white);border-radius:4px;box-shadow:0 1px 8px rgba(0,0,0,0.05);overflow:hidden;display:flex;align-items:center;flex:1}
#s8 .mstat-bar{width:4px;align-self:stretch}
#s8 .mstat-val{font-family:Georgia,'Times New Roman',serif;font-size:clamp(18px,2vw,28px);font-weight:700;color:var(--dark);padding:9px 13px;white-space:nowrap}
#s8 .mstat-desc{font-size:11px;color:var(--gray);line-height:1.4;padding-right:10px}

/* S9 */
#s9{flex-direction:column}
#s9 .intro{font-size:13px;color:var(--gray);font-style:italic;margin-top:5px;margin-bottom:13px}
#s9 .modules{display:flex;flex-direction:column;gap:7px;flex:1;min-height:0;justify-content:center}
#s9 .mod-row{display:grid;grid-template-columns:2.1fr 0.7fr 3fr;align-items:center;background:var(--white);border-radius:4px;box-shadow:0 1px 8px rgba(0,0,0,0.05);overflow:hidden;padding:12px 0}

#s9 .mod-left{display:flex;align-items:stretch}
#s9 .mod-bar{width:4px;margin-right:14px;align-self:stretch}
#s9 .mod-name{font-size:11px;font-weight:500;color:var(--dark)}
#s9 .mod-badge{font-size:10px;font-weight:700;padding:4px 11px;border-radius:2px;text-align:center;color:var(--white);white-space:nowrap}
#s9 .mod-desc{font-size:11px;color:var(--gray);padding:0 18px;line-height:1.5}

/* S10 */
#s10{flex-direction:column}
#s10 .phases{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;flex:1;margin-top:16px;min-height:0}
#s10 .phase-card{background:var(--white);border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;display:flex;flex-direction:column;padding:16px 15px 14px}
#s10 .phase-num{width:32px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:Georgia,'Times New Roman',serif;font-size:19px;font-weight:700;color:var(--white);margin-bottom:9px}
#s10 .phase-meta{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:0.09em;color:var(--gray);margin-bottom:3px}
#s10 .phase-label{font-family:Georgia,'Times New Roman',serif;font-size:16px;font-weight:700;color:var(--dark);margin-bottom:11px;line-height:1.2}
#s10 .phase-items{flex:1}
#s10 .phase-items li{font-size:11px;color:var(--text);padding:4px 0;list-style:none;display:flex;gap:7px;border-bottom:1px solid var(--lgray);line-height:1.45}
#s10 .phase-items li:last-child{border:none}
#s10 .phase-items li::before{content:'Ã¢â€ â€™';color:var(--mid);font-weight:500;flex-shrink:0}

/* S11 */
#s11{flex-direction:column;justify-content:center}
#s11 .points{display:flex;flex-direction:column;gap:14px;margin-top:26px;max-width:660px}
#s11 .point{display:flex;gap:15px;align-items:flex-start}
#s11 .point-num{width:26px;height:26px;background:var(--accent);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--dark);flex-shrink:0;margin-top:2px}
#s11 .point-txt{font-size:clamp(12px,1.15vw,14px);color:rgba(255,255,255,0.85);line-height:1.6}
#s11 .tagline{position:absolute;bottom:36px;left:62px;right:180px;font-family:Georgia,'Times New Roman',serif;font-size:clamp(13px,1.3vw,16px);font-style:italic;color:var(--accent)}

/* S12 */
#s12{flex-direction:column;justify-content:center}
#s12 h1{color:var(--white);max-width:620px}
#s12 .lead{font-size:clamp(14px,1.45vw,18px);color:var(--light);font-family:Georgia,'Times New Roman',serif;font-weight:600;margin-top:16px;max-width:580px;line-height:1.45}
#s12 .body{font-size:clamp(12px,1.05vw,14px);color:rgba(194,213,200,0.82);margin-top:13px;max-width:540px;line-height:1.78}
#s12 .pills{display:flex;gap:10px;margin-top:30px}
#s12 .pill{padding:7px 18px;background:var(--mid);border-radius:3px;font-size:11px;font-weight:500;color:var(--white);letter-spacing:0.06em;text-transform:uppercase}
#s12 .note{position:absolute;bottom:36px;left:62px;font-family:Georgia,'Times New Roman',serif;font-size:clamp(13px,1.25vw,16px);font-style:italic;color:var(--accent);max-width:560px;line-height:1.55}

/* S13 */
#s13{flex-direction:column}
#s13 .sectors{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;flex:1;margin-top:16px;min-height:0}
#s13 .sector{background:var(--white);border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;display:flex;flex-direction:column}
#s13 .sector-head{padding:13px 15px 9px;border-bottom:1px solid var(--lgray)}
#s13 .sector-tag{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
#s13 .sector-title{font-family:Georgia,'Times New Roman',serif;font-size:16px;font-weight:700;color:var(--dark);line-height:1.2}
#s13 .sector-items{padding:11px 15px;flex:1}
#s13 .sector-items li{font-size:11.5px;color:var(--text);padding:5px 0;list-style:none;border-bottom:1px solid var(--lgray);display:flex;gap:7px;line-height:1.45}
#s13 .sector-items li:last-child{border:none}
#s13 .sector-items li::before{content:'Ã‚Â·';font-size:16px;color:var(--mid);flex-shrink:0;line-height:1.3}
#s13 .sector-note{padding:9px 15px 12px;font-size:10px;color:var(--gray);font-style:italic;line-height:1.5;border-top:1px solid var(--lgray)}
#s13 .footer-bar{background:#EAF4EE;border-left:3px solid var(--mid);padding:10px 16px;font-size:12px;color:var(--text);margin-top:12px;border-radius:2px;flex-shrink:0}

/* S14 */
#s14{flex-direction:column}
#s14 .cols{display:grid;grid-template-columns:1fr 1fr;gap:15px;flex:1;margin-top:16px;min-height:0}
#s14 .col-card{background:var(--white);border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.06);overflow:hidden;display:flex;flex-direction:column}
#s14 .col-head{padding:13px 19px 9px;border-bottom:1px solid var(--lgray)}
#s14 .col-head h3{color:var(--dark)}
#s14 .signals{padding:7px 19px;flex:1}
#s14 .sig-row{display:flex;align-items:baseline;gap:11px;padding:6px 0;border-bottom:1px solid var(--lgray)}
#s14 .sig-row:last-child{border:none}
#s14 .sig-param{font-size:11px;font-weight:500;color:var(--mid);width:100px;flex-shrink:0}
#s14 .sig-desc{font-size:11px;color:var(--gray);line-height:1.45}
#s14 .animals{flex:1}
#s14 .anim-row{display:grid;grid-template-columns:1.35fr 2fr;padding:8px 19px;border-bottom:1px solid var(--lgray);align-items:center}
#s14 .anim-row:last-child{border:none}
#s14 .anim-row:nth-child(even){background:var(--bg)}
#s14 .anim-type{font-size:11px;font-weight:500;color:var(--dark)}
#s14 .anim-why{font-size:11px;color:var(--gray);line-height:1.45}
#s14 .footer-bar{background:#FEF9EC;border-left:3px solid var(--accent);padding:10px 16px;font-size:12px;color:var(--text);margin-top:11px;border-radius:2px;flex-shrink:0}
<script>
<script>
/* === NEUROALERT_MOBILE_SLIDE_SCROLL_FIX_V2 === */
(function () {
  function isMobileTouch() {
    return (window.matchMedia && (
      window.matchMedia('(max-width: 900px)').matches ||
      window.matchMedia('(hover: none) and (pointer: coarse)').matches
    )) || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  }
  if (!isMobileTouch()) return;

  var STYLE_ID = 'neuroalert-mobile-slide-scroll-runtime-v2';

  function cssEscape(s) {
    try { return CSS.escape(s); } catch(e) { return String(s).replace(/[^a-zA-Z0-9_-]/g, '\\</body>'); }
  }

  function looksLikeSlide(el) {
    if (!el || !el.getBoundingClientRect) return false;
    var cls = (el.className || '').toString();
    var id = (el.id || '').toString();
    if (/slide|page|panel|card|screen/i.test(cls + ' ' + id)) return true;
    if (el.tagName === 'SECTION' || el.tagName === 'ARTICLE') return true;
    return false;
  }

  function candidates() {
    var sel = [
      'section','article','main > div',
      '.slide','[class*="slide"]','[class*="Slide"]',
      '[class*="page"]','[class*="Page"]',
      '[class*="panel"]','[class*="Panel"]',
      '[data-slide]','[data-page]'
    ].join(',');
    return Array.prototype.slice.call(document.querySelectorAll(sel)).filter(looksLikeSlide);
  }

  function isVisible(el) {
    var r = el.getBoundingClientRect();
    var st = getComputedStyle(el);
    return r.width > 20 && r.height > 20 && st.display !== 'none' && st.visibility !== 'hidden' && Number(st.opacity || 1) > 0.01;
  }

  function unlock() {
    document.documentElement.classList.add('neuroalert-mobile-scroll-v2');
    document.body.classList.add('neuroalert-mobile-scroll-v2');

    document.documentElement.style.height = '100%';
    document.documentElement.style.overflow = 'hidden';
    document.body.style.height = '100%';
    document.body.style.overflow = 'hidden';

    });
